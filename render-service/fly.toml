app = "cti-video-render"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[checks]
  [checks.health]
    type = "http"
    path = "/health"
    interval = "15s"
    timeout = "5s"
