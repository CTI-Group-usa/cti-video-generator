app = "cti-video-render"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # auto_stop_machines must stay off: /generate-assets and /render respond 202
  # immediately and keep working in the background after the request ends, so
  # Fly's idle-connection auto-stop would kill that work mid-loop (confirmed:
  # a machine stopped mid-run, silently halting scene generation after scene 4).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[checks]
  [checks.health]
    type = "http"
    path = "/health"
    interval = "15s"
    timeout = "5s"
